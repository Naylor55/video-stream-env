services:
  srs:
    image: ossrs/srs:5
    container_name: srs
    restart: unless-stopped
    ports:
      - "31935:1935"
      - "1985:1985"
      - "38080:8080"
      - "8000:8000/udp"
    environment:
        # WebRTC 必须配置，否则 ICE 会失败
      CANDIDATE: 192.168.1.93
  ffmpeg:
    image: jrottenberg/ffmpeg:4.4-alpine
    container_name: ffmpeg
    restart: unless-stopped
    depends_on:
      - srs
    volumes:
      - ./video:/video
    command: >
      -stream_loop -1
      -re -i /video/cmzw.mp4
      -c:v libx264 -preset ultrafast -tune zerolatency
      -b:v 2000k
      -c:a aac -b:a 128k
      -f flv
      rtmp://srs:1935/live/livestream
  nginx:
    image: nginx:alpine
    container_name: web
    ports:
      - "8555:80"
    volumes:
      - ./web:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - srs
      - ffmpeg
